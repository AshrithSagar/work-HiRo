[project]
name = "pacer"
version = "0.1.0"
description = "Progress-Aligned Curation for Error-Resilient Imitation Learning"
readme = "README.md"
authors = [{ name = "Ashrith Sagar", email = "ashrithy@iisc.ac.in" }]
requires-python = ">=3.14"
dependencies = [
    "deprecated>=1.3.1",
    "matplotlib>=3.10.8",
    "numpy>=2.4.2",
    "optype[numpy]>=0.15.0",
    "pylasadataset>=0.1.1",
    "rich>=14.3.2",
    "scikit-learn>=1.8.0",
    "scipy>=1.17.0",
    "torch>=2.10.0",
    "typed-numpy",
]

[dependency-groups]
dev = [
    "microsoft-python-type-stubs",
    "numtype>=2.4.0.0a1",
    "scipy-stubs>=1.17.0.2",
]
lint = ["ruff>=0.15.0"]
test = ["pytest>=9.0.2", "pytest-memray>=1.8.0"]
typecheck = [
    "basedpyright>=1.37.4",
    "mypy>=1.19.1",
    "pyrefly>=0.52.0",
    "pyright>=1.1.408",
    "ty>=0.0.16",
]

[build-system]
requires = ["uv_build>=0.10.2"]
build-backend = "uv_build"

[tool.uv.sources]
microsoft-python-type-stubs = { git = "https://github.com/microsoft/python-type-stubs.git" }
typed-numpy = { git = "https://github.com/AshrithSagar/typed-numpy.git", rev = "main" }
